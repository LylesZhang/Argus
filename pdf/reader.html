<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Argus PDF Reader</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <div id="app" data-theme="warm">
    <div class="dra-reader-shell">
      <header class="dra-reader-topbar">
        <div class="dra-reader-brand">Argus Reader</div>
        <div class="dra-reader-actions">
          <button class="dra-reader-theme-light" data-theme="light">Light</button>
          <button class="dra-reader-theme-warm active" data-theme="warm">Warm</button>
          <button class="dra-reader-theme-dark" data-theme="dark">Dark</button>
          <button class="dra-reader-close" id="close-reader" aria-label="Close">×</button>
        </div>
        <div id="progress" class="dra-reader-progress" aria-hidden="true"><i></i></div>
      </header>
      <main id="scroll" class="dra-reader-scroll">
        <article id="article" class="dra-reader-article" aria-live="polite"><p class="status">Loading PDF…</p></article>
      </main>
      <div id="ruler-top" class="ruler"></div><div id="ruler-bottom" class="ruler"></div>
    </div>
  </div>
  <script src="reader.bundle.js"></script>
</body>
</html>
